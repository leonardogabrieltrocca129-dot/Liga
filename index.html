<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIGA PRIVADA — Temporada 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  // ===================== FIREBASE CONFIG =====================
  const firebaseConfig = {
    apiKey: "AIzaSyDVXcME2fMRe6dTwqtEhiV2CVaEqUqeNxc",
    authDomain: "liga-2d74b.firebaseapp.com",
    projectId: "liga-2d74b",
    storageBucket: "liga-2d74b.firebasestorage.app",
    messagingSenderId: "383618580782",
    appId: "1:383618580782:web:e4b4e5dbc310a93b117abf",
    measurementId: "G-SEHRGFYR1D"
  };

  let db;
  let useFirebase = false;

  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    useFirebase = true;
    console.log("✅ Firebase conectado correctamente");
  } catch(e) {
    console.warn("Firebase no disponible, usando almacenamiento local", e);
  }

  // ===================== STATE =====================
  const TEAMS = ["Gabriel", "Ignacio", "Francisco"];
  const TEAM_COLORS = {
    "Gabriel":   { primary: "#00c3ff", accent: "#0077cc", badge: "GAB" },
    "Ignacio":   { primary: "#ff6b35", accent: "#cc3300", badge: "IGN" },
    "Francisco": { primary: "#a8ff3e", accent: "#5a8a00", badge: "FRA" }
  };

  // 102 partidos en 17 semanas (6 por semana)
  // Formato: cada semana cada equipo juega 2 veces
  function generateFixture() {
    const startDate = new Date("2025-03-17");
    const fixtures = [];
    let matchId = 1;
    
    for (let week = 1; week <= 17; week++) {
      const weekDate = new Date(startDate);
      weekDate.setDate(startDate.getDate() + (week - 1) * 7);
      
      const pairs = [
        ["Gabriel", "Ignacio"],
        ["Gabriel", "Francisco"],
        ["Ignacio", "Francisco"],
        ["Ignacio", "Gabriel"],
        ["Francisco", "Gabriel"],
        ["Francisco", "Ignacio"],
      ];
      
      pairs.forEach((pair, i) => {
        const matchDate = new Date(weekDate);
        matchDate.setDate(weekDate.getDate() + Math.floor(i / 2));
        fixtures.push({
          id: matchId++,
          week,
          home: pair[0],
          away: pair[1],
          date: matchDate.toISOString().split("T")[0],
          played: false,
          stats: null
        });
      });
    }
    // Solo 102 partidos
    return fixtures.slice(0, 102);
  }

  let allMatches = [];
  let currentView = "home";
  let editingMatch = null;

  // ===================== LOCAL STORAGE =====================
  function saveLocal() {
    localStorage.setItem("liga_matches", JSON.stringify(allMatches));
  }

  function loadLocal() {
    const saved = localStorage.getItem("liga_matches");
    if (saved) {
      allMatches = JSON.parse(saved);
    } else {
      allMatches = generateFixture();
      saveLocal();
    }
  }

  // ===================== FIREBASE STORAGE =====================
  async function saveToFirebase(match) {
    if (!useFirebase || !db) return;
    try {
      const ref = doc(db, "matches", String(match.id));
      await setDoc(ref, match);
    } catch(e) {
      console.warn("Error guardando en Firebase:", e);
    }
  }

  async function loadFromFirebase() {
    if (!useFirebase || !db) return false;
    try {
      const snapshot = await getDocs(collection(db, "matches"));
      if (snapshot.empty) return false;
      const fbMatches = {};
      snapshot.forEach(d => { const data = d.data(); fbMatches[data.id] = data; });
      allMatches = allMatches.map(m => fbMatches[m.id] ? fbMatches[m.id] : m);
      saveLocal();
      return true;
    } catch(e) {
      console.warn("Error cargando desde Firebase:", e);
      return false;
    }
  }

  // ===================== STATS CALCULATION =====================
  function getStandings() {
    const standings = {};
    TEAMS.forEach(t => {
      standings[t] = { team: t, played: 0, won: 0, draw: 0, lost: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
    });

    allMatches.filter(m => m.played && m.stats).forEach(m => {
      const hg = m.stats.homeGoals;
      const ag = m.stats.awayGoals;
      standings[m.home].played++;
      standings[m.away].played++;
      standings[m.home].gf += hg;
      standings[m.home].ga += ag;
      standings[m.away].gf += ag;
      standings[m.away].ga += hg;

      if (hg > ag) {
        standings[m.home].won++;
        standings[m.away].lost++;
        standings[m.home].pts += 3;
      } else if (hg < ag) {
        standings[m.away].won++;
        standings[m.home].lost++;
        standings[m.away].pts += 3;
      } else {
        standings[m.home].draw++;
        standings[m.away].draw++;
        standings[m.home].pts++;
        standings[m.away].pts++;
      }
    });

    TEAMS.forEach(t => {
      standings[t].gd = standings[t].gf - standings[t].ga;
    });

    return Object.values(standings).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  }

  function getTeamStats(teamName) {
    const matches = allMatches.filter(m => m.played && m.stats && (m.home === teamName || m.away === teamName));
    if (!matches.length) return null;

    const sum = (key, isHome) => matches.reduce((acc, m) => {
      const isH = m.home === teamName;
      return acc + (isH ? (m.stats["home" + key] || 0) : (m.stats["away" + key] || 0));
    }, 0);

    return {
      matches: matches.length,
      goals: sum("Goals"),
      shots: sum("Shots"),
      shotsOnTarget: sum("ShotsOnTarget"),
      possession: Math.round(matches.reduce((acc, m) => {
        return acc + (m.home === teamName ? (m.stats.homePossession || 50) : (m.stats.awayPossession || 50));
      }, 0) / matches.length),
      passes: sum("Passes"),
      passesCompleted: sum("PassesCompleted"),
      fouls: sum("Fouls"),
      corners: sum("Corners"),
      freekicks: sum("Freekicks"),
      offsides: sum("Offsides"),
      crosses: sum("Crosses"),
      interceptions: sum("Interceptions"),
      tackles: sum("Tackles"),
      saves: sum("Saves"),
    };
  }

  // ===================== RENDER ENGINE =====================
  function render() {
    const app = document.getElementById("app");
    switch(currentView) {
      case "home": app.innerHTML = renderHome(); break;
      case "fixture": app.innerHTML = renderFixture(); break;
      case "standings": app.innerHTML = renderStandings(); break;
      case "stats": app.innerHTML = renderStats(); break;
      case "load": app.innerHTML = renderLoadMatch(); break;
      case "ai": app.innerHTML = renderAILoad(); break;
    }
    bindEvents();
  }

  // ===================== HOME =====================
  function renderHome() {
    const standings = getStandings();
    const played = allMatches.filter(m => m.played).length;
    const remaining = allMatches.filter(m => !m.played).length;
    const nextMatches = allMatches.filter(m => !m.played).slice(0, 3);

    return `
    <div class="page-home">
      <div class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
          <div class="league-badge">
            <div class="badge-icon">⚽</div>
            <div>
              <div class="league-title">LIGA PRIVADA</div>
              <div class="league-subtitle">TEMPORADA 2025 — 102 PARTIDOS</div>
            </div>
          </div>
          <div class="hero-stats-row">
            <div class="hero-stat"><span class="hs-num">${played}</span><span class="hs-label">Jugados</span></div>
            <div class="hero-stat"><span class="hs-num">${remaining}</span><span class="hs-label">Restantes</span></div>
            <div class="hero-stat"><span class="hs-num">17</span><span class="hs-label">Semanas</span></div>
            <div class="hero-stat"><span class="hs-num">3</span><span class="hs-label">Equipos</span></div>
          </div>
        </div>
      </div>

      <div class="home-grid">
        <div class="card standings-mini">
          <div class="card-header"><span class="card-title">🏆 TABLA</span></div>
          <table class="mini-table">
            <thead><tr><th>#</th><th>Equipo</th><th>PJ</th><th>PTS</th><th>DG</th></tr></thead>
            <tbody>
              ${standings.map((s, i) => `
                <tr class="${i === 0 ? 'leader' : ''}">
                  <td><span class="pos-badge pos-${i+1}">${i+1}</span></td>
                  <td>
                    <div class="team-cell">
                      <div class="team-dot" style="background:${TEAM_COLORS[s.team].primary}"></div>
                      <span>${s.team}</span>
                    </div>
                  </td>
                  <td>${s.played}</td>
                  <td><strong>${s.pts}</strong></td>
                  <td>${s.gd > 0 ? '+' : ''}${s.gd}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="card next-matches">
          <div class="card-header"><span class="card-title">📅 PRÓXIMOS</span></div>
          ${nextMatches.length === 0 ? '<div class="empty-state">¡Liga finalizada! 🎉</div>' :
            nextMatches.map(m => `
              <div class="next-match-item">
                <div class="nm-week">SEM ${m.week}</div>
                <div class="nm-teams">
                  <span class="nm-team" style="color:${TEAM_COLORS[m.home].primary}">${m.home}</span>
                  <span class="nm-vs">VS</span>
                  <span class="nm-team" style="color:${TEAM_COLORS[m.away].primary}">${m.away}</span>
                </div>
                <div class="nm-date">${formatDate(m.date)}</div>
              </div>
            `).join('')
          }
        </div>

        <div class="card quick-actions">
          <div class="card-header"><span class="card-title">⚡ ACCIONES</span></div>
          <div class="qa-grid">
            <button class="qa-btn" data-view="load">📋 CARGA MANUAL</button>
            <button class="qa-btn qa-ai" data-view="ai">🤖 CARGA CON IA</button>
            <button class="qa-btn" data-view="fixture">📆 VER FIXTURE</button>
            <button class="qa-btn" data-view="stats">📊 ESTADÍSTICAS</button>
          </div>
        </div>

        ${played > 0 ? `
        <div class="card top-stats">
          <div class="card-header"><span class="card-title">🔥 ESTE TORNEO</span></div>
          ${TEAMS.map(t => {
            const st = getTeamStats(t);
            if (!st) return '';
            const s = getStandings().find(x => x.team === t);
            return `
              <div class="top-stat-row">
                <div class="ts-team">
                  <div class="ts-dot" style="background:${TEAM_COLORS[t].primary}"></div>
                  <span>${t}</span>
                </div>
                <div class="ts-nums">
                  <span title="Goles">${s.gf} ⚽</span>
                  <span title="Disparos">${st.shots} 🎯</span>
                  <span title="Posesión">${st.possession}% 🔵</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
        ` : ''}
      </div>
    </div>`;
  }

  // ===================== FIXTURE =====================
  function renderFixture() {
    const weeks = [...new Set(allMatches.map(m => m.week))];
    const filterWeek = window._fixtureWeek || "all";

    return `
    <div class="page-fixture">
      <div class="page-header">
        <h2 class="page-title">📆 FIXTURE COMPLETO</h2>
        <div class="filter-bar">
          <select id="weekFilter" class="filter-select">
            <option value="all" ${filterWeek==="all"?"selected":""}>Todas las semanas</option>
            ${weeks.map(w => `<option value="${w}" ${filterWeek==w?"selected":""}">Semana ${w}</option>`).join('')}
          </select>
          <div class="filter-legend">
            <span class="leg-item"><span class="leg-dot played"></span>Jugado</span>
            <span class="leg-item"><span class="leg-dot pending"></span>Pendiente</span>
          </div>
        </div>
      </div>
      <div class="fixture-list">
        ${weeks.filter(w => filterWeek === "all" || w == filterWeek).map(week => {
          const wMatches = allMatches.filter(m => m.week === week);
          return `
            <div class="week-block">
              <div class="week-header">SEMANA ${week} <span class="week-date">${formatDate(wMatches[0].date)}</span></div>
              <div class="week-matches">
                ${wMatches.map(m => `
                  <div class="fixture-match ${m.played ? 'played' : 'pending'}" data-id="${m.id}">
                    <div class="fm-teams">
                      <div class="fm-team home">
                        <span class="fm-name" style="color:${TEAM_COLORS[m.home].primary}">${m.home}</span>
                        ${m.played ? `<span class="fm-score">${m.stats.homeGoals}</span>` : ''}
                      </div>
                      <div class="fm-middle">
                        ${m.played ? `<span class="fm-dash">—</span>` : `<span class="fm-vs-badge">VS</span>`}
                      </div>
                      <div class="fm-team away">
                        ${m.played ? `<span class="fm-score">${m.stats.awayGoals}</span>` : ''}
                        <span class="fm-name" style="color:${TEAM_COLORS[m.away].primary}">${m.away}</span>
                      </div>
                    </div>
                    <div class="fm-actions">
                      ${!m.played ? `<button class="btn-load-match" data-id="${m.id}">+ Cargar</button>` : `<button class="btn-edit-match" data-id="${m.id}">✏️ Editar</button>`}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>`;
  }

  // ===================== STANDINGS =====================
  function renderStandings() {
    const standings = getStandings();
    return `
    <div class="page-standings">
      <div class="page-header">
        <h2 class="page-title">🏆 TABLA DE POSICIONES</h2>
      </div>
      <div class="standings-full">
        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th><th>EQUIPO</th><th>PJ</th><th>G</th><th>E</th><th>P</th>
              <th>GF</th><th>GC</th><th>DG</th><th>PTS</th><th>FORMA</th>
            </tr>
          </thead>
          <tbody>
            ${standings.map((s, i) => {
              const form = getForm(s.team);
              return `
                <tr class="standings-row ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">
                  <td><span class="pos-circle">${i+1}</span></td>
                  <td>
                    <div class="team-full">
                      <div class="team-badge-sm" style="background:${TEAM_COLORS[s.team].primary};color:#000">${TEAM_COLORS[s.team].badge}</div>
                      <span class="team-name-lg">${s.team}</span>
                    </div>
                  </td>
                  <td>${s.played}</td>
                  <td class="green">${s.won}</td>
                  <td class="yellow">${s.draw}</td>
                  <td class="red">${s.lost}</td>
                  <td>${s.gf}</td>
                  <td>${s.ga}</td>
                  <td class="${s.gd>=0?'green':'red'}">${s.gd>0?'+':''}${s.gd}</td>
                  <td><strong class="pts-big">${s.pts}</strong></td>
                  <td><div class="form-row">${form.map(r => `<span class="form-dot ${r}">${r==='W'?'G':r==='D'?'E':'P'}</span>`).join('')}</div></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>

      <div class="results-section">
        <h3 class="section-title">📋 ÚLTIMOS RESULTADOS</h3>
        <div class="results-list">
          ${allMatches.filter(m => m.played).reverse().slice(0, 10).map(m => `
            <div class="result-item">
              <div class="ri-week">S${m.week}</div>
              <div class="ri-match">
                <span style="color:${TEAM_COLORS[m.home].primary}">${m.home}</span>
                <span class="ri-score">${m.stats.homeGoals} — ${m.stats.awayGoals}</span>
                <span style="color:${TEAM_COLORS[m.away].primary}">${m.away}</span>
              </div>
              <div class="ri-date">${formatDate(m.date)}</div>
            </div>
          `).join('') || '<div class="empty-state">No hay resultados aún</div>'}
        </div>
      </div>
    </div>`;
  }

  function getForm(team) {
    return allMatches
      .filter(m => m.played && m.stats && (m.home === team || m.away === team))
      .slice(-5)
      .map(m => {
        const isHome = m.home === team;
        const scored = isHome ? m.stats.homeGoals : m.stats.awayGoals;
        const conceded = isHome ? m.stats.awayGoals : m.stats.homeGoals;
        return scored > conceded ? 'W' : scored < conceded ? 'L' : 'D';
      });
  }

  // ===================== STATS =====================
  function renderStats() {
    const activeTeam = window._statsTeam || TEAMS[0];

    return `
    <div class="page-stats">
      <div class="page-header">
        <h2 class="page-title">📊 ESTADÍSTICAS</h2>
        <div class="team-tabs">
          ${TEAMS.map(t => `
            <button class="team-tab ${t === activeTeam ? 'active' : ''}" data-team="${t}" style="${t===activeTeam?`border-color:${TEAM_COLORS[t].primary};color:${TEAM_COLORS[t].primary}`:''}">
              ${t}
            </button>
          `).join('')}
        </div>
      </div>
      ${renderTeamStats(activeTeam)}
    </div>`;
  }

  function renderTeamStats(teamName) {
    const st = getTeamStats(teamName);
    const s = getStandings().find(x => x.team === teamName);
    const col = TEAM_COLORS[teamName].primary;

    if (!st || st.matches === 0) {
      return `<div class="empty-state" style="margin:40px auto">No hay partidos jugados para ${teamName} aún</div>`;
    }

    const passAcc = st.passes > 0 ? Math.round((st.passesCompleted / st.passes) * 100) : 0;

    return `
    <div class="team-stats-container">
      <div class="ts-hero" style="border-color:${col}">
        <div class="tsh-badge" style="background:${col};color:#000">${TEAM_COLORS[teamName].badge}</div>
        <div class="tsh-name">${teamName}</div>
        <div class="tsh-record">${s.won}G ${s.draw}E ${s.lost}P</div>
        <div class="tsh-pts">${s.pts} <span>PTS</span></div>
      </div>

      <div class="stats-grid">
        ${statCard("Goles", s.gf, "⚽", col)}
        ${statCard("Disparos", st.shots, "🎯", col)}
        ${statCard("Al arco", st.shotsOnTarget, "🥅", col)}
        ${statCard("Posesión", st.possession + "%", "🔵", col)}
        ${statCard("Pases", st.passes, "↗", col)}
        ${statCard("Precisión pases", passAcc + "%", "✅", col)}
        ${statCard("Faltas", st.fouls, "🟨", col)}
        ${statCard("Corners", st.corners, "🚩", col)}
        ${statCard("Tiros libres", st.freekicks, "🎽", col)}
        ${statCard("Fueras de juego", st.offsides, "🚫", col)}
        ${statCard("Centros", st.crosses, "↩", col)}
        ${statCard("Interceptaciones", st.interceptions, "✋", col)}
        ${statCard("Entradas", st.tackles, "💥", col)}
        ${statCard("Paradas", st.saves, "🧤", col)}
      </div>

      <div class="chart-section">
        <h3 class="section-title" style="color:${col}">GOLES POR SEMANA</h3>
        <div class="goals-chart">
          ${renderGoalsChart(teamName, col)}
        </div>
      </div>

      <div class="vs-section">
        <h3 class="section-title">HEAD TO HEAD</h3>
        <div class="h2h-grid">
          ${TEAMS.filter(t => t !== teamName).map(opp => renderH2H(teamName, opp)).join('')}
        </div>
      </div>
    </div>`;
  }

  function statCard(label, value, icon, color) {
    return `
      <div class="stat-card" style="border-top-color:${color}">
        <div class="sc-icon">${icon}</div>
        <div class="sc-value">${value}</div>
        <div class="sc-label">${label}</div>
      </div>`;
  }

  function renderGoalsChart(team, color) {
    const byWeek = {};
    allMatches.filter(m => m.played && m.stats && (m.home === team || m.away === team))
      .forEach(m => {
        const g = m.home === team ? m.stats.homeGoals : m.stats.awayGoals;
        byWeek[m.week] = (byWeek[m.week] || 0) + g;
      });
    
    if (Object.keys(byWeek).length === 0) return '<div class="empty-state">Sin datos</div>';
    
    const max = Math.max(...Object.values(byWeek)) || 1;
    return `<div class="bar-chart">
      ${Object.entries(byWeek).map(([w, g]) => `
        <div class="bar-wrap">
          <div class="bar" style="height:${(g/max)*80}px;background:${color}" title="${g} goles"></div>
          <div class="bar-label">S${w}</div>
          <div class="bar-val">${g}</div>
        </div>
      `).join('')}
    </div>`;
  }

  function renderH2H(team, opp) {
    const matches = allMatches.filter(m => m.played && m.stats &&
      ((m.home === team && m.away === opp) || (m.home === opp && m.away === team)));
    
    let tw = 0, d = 0, ow = 0;
    matches.forEach(m => {
      const ts = m.home === team ? m.stats.homeGoals : m.stats.awayGoals;
      const os = m.home === opp ? m.stats.homeGoals : m.stats.awayGoals;
      if (ts > os) tw++;
      else if (ts < os) ow++;
      else d++;
    });

    const col1 = TEAM_COLORS[team].primary;
    const col2 = TEAM_COLORS[opp].primary;
    const total = tw + d + ow || 1;

    return `
      <div class="h2h-card">
        <div class="h2h-header">
          <span style="color:${col1}">${team}</span>
          <span class="h2h-vs">VS</span>
          <span style="color:${col2}">${opp}</span>
        </div>
        <div class="h2h-bar">
          <div class="h2h-seg" style="width:${(tw/total)*100}%;background:${col1}"></div>
          <div class="h2h-seg" style="width:${(d/total)*100}%;background:#666"></div>
          <div class="h2h-seg" style="width:${(ow/total)*100}%;background:${col2}"></div>
        </div>
        <div class="h2h-nums">
          <span style="color:${col1}">${tw}G</span>
          <span>${d}E</span>
          <span style="color:${col2}">${ow}G</span>
        </div>
      </div>`;
  }

  // ===================== LOAD MATCH (MANUAL) =====================
  function renderLoadMatch() {
    const mid = window._loadMatchId;
    let match = mid ? allMatches.find(m => m.id == mid) : null;
    
    // si hay match seleccionado desde fixture, lo usamos
    const pendingMatches = allMatches.filter(m => !m.played);
    const playedMatches = allMatches.filter(m => m.played);

    const s = match?.stats || {};

    return `

  function statRow(label, key, home, away, s, min, max) {

  // ===================== AI LOAD =====================
  function renderAILoad() {
    return `
    <div class="page-ai">
      <div class="page-header">
        <h2 class="page-title">🤖 CARGA CON IA</h2>

  }

  // ===================== EVENTS =====================
  function bindEvents() {
    // Nav
    document.querySelectorAll("[data-view]").forEach(btn => {
      btn.addEventListener("click", () => {
        currentView = btn.dataset.view;
        window._loadMatchId = null;
        render();
        document.getElementById("app").scrollTop = 0;
      });
    });

    // Nav active state
    document.querySelectorAll(".nav-item").forEach(item => {
      item.classList.toggle("active", item.dataset.view === currentView);
    });

    // Fixture week filter
    const wf = document.getElementById("weekFilter");
    if (wf) wf.addEventListener("change", e => { window._fixtureWeek = e.target.value; render(); });

    // Load match from fixture
    document.querySelectorAll("[data-select-match], .btn-load-match").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.selectMatch || btn.dataset.id;
        window._loadMatchId = id;
        currentView = "load";
        render();
      });
    });

    // Edit match from fixture
    document.querySelectorAll(".btn-edit-match").forEach(btn => {
      btn.addEventListener("click", () => {
        window._loadMatchId = btn.dataset.id;
        currentView = "load";
        render();
      });
    });

    // Cancel load
    const cancelBtn = document.getElementById("cancelLoad");
    if (cancelBtn) cancelBtn.addEventListener("click", () => {
      window._loadMatchId = null;
      currentView = "fixture";
      render();
    });

    // Save match
    const saveBtn = document.getElementById("saveMatch");
    if (saveBtn) saveBtn.addEventListener("click", () => {
      const id = parseInt(saveBtn.dataset.id);
      const match = allMatches.find(m => m.id === id);
      if (!match) return;

      const hg = parseInt(document.getElementById("homeGoals").value);
      const ag = parseInt(document.getElementById("awayGoals").value);
      
      if (isNaN(hg) || isNaN(ag)) {
        showToast("⚠️ Ingresá los goles de ambos equipos", "error");
        return;
      }

      const getVal = (id) => {
        const v = parseInt(document.getElementById(id)?.value);
        return isNaN(v) ? 0 : v;
      };

      match.stats = {
        homeGoals: hg, awayGoals: ag,
        homePossession: getVal("homePossession"), awayPossession: getVal("awayPossession"),
        homeShots: getVal("homeShots"), awayShots: getVal("awayShots"),
        homeShotsOnTarget: getVal("homeShotsOnTarget"), awayShotsOnTarget: getVal("awayShotsOnTarget"),
        homeFouls: getVal("homeFouls"), awayFouls: getVal("awayFouls"),
        homeOffsides: getVal("homeOffsides"), awayOffsides: getVal("awayOffsides"),
        homeCorners: getVal("homeCorners"), awayCorners: getVal("awayCorners"),
        homeFreekicks: getVal("homeFreekicks"), awayFreekicks: getVal("awayFreekicks"),
        homePasses: getVal("homePasses"), awayPasses: getVal("awayPasses"),
        homePassesCompleted: getVal("homePassesCompleted"), awayPassesCompleted: getVal("awayPassesCompleted"),
        homeCrosses: getVal("homeCrosses"), awayCrosses: getVal("awayCrosses"),
        homeInterceptions: getVal("homeInterceptions"), awayInterceptions: getVal("awayInterceptions"),
        homeTackles: getVal("homeTackles"), awayTackles: getVal("awayTackles"),
        homeSaves: getVal("homeSaves"), awaySaves: getVal("awaySaves"),
      };

      const dateInput = document.getElementById("matchDate");
      if (dateInput) match.date = dateInput.value;
      
      match.played = true;
      saveLocal();
      saveToFirebase(match);
      showToast("✅ ¡Partido guardado correctamente!");
      window._loadMatchId = null;
      currentView = "standings";
      render();
    });

    // Stats team tabs
    document.querySelectorAll(".team-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        window._statsTeam = btn.dataset.team;
        render();
      });
    });

    // AI Upload
    const uploadZone = document.getElementById("aiUploadZone");
    const imgInput = document.getElementById("aiImageInput");
    if (uploadZone && imgInput) {
      uploadZone.addEventListener("click", () => imgInput.click());
      uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
      uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
      uploadZone.addEventListener("drop", e => {
        e.preventDefault();
        uploadZone.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file) handleImageUpload(file);
      });
      imgInput.addEventListener("change", e => {
        if (e.target.files[0]) handleImageUpload(e.target.files[0]);
      });
    }

    const matchSelect = document.getElementById("aiMatchSelect");
    if (matchSelect) matchSelect.addEventListener("change", updateAIButton);

    const extractBtn = document.getElementById("btnAIExtract");
    if (extractBtn) extractBtn.addEventListener("click", extractWithAI);

    const cancelAI = document.getElementById("cancelAI");
    if (cancelAI) cancelAI.addEventListener("click", () => { currentView = "fixture"; render(); });

    const saveAI = document.getElementById("saveAIMatch");
    if (saveAI) saveAI.addEventListener("click", saveAIExtracted);
  }

  let aiImageBase64 = null;
  let aiExtractedData = null;

  function handleImageUpload(file) {
    const reader = new FileReader();
    reader.onload = e => {
      aiImageBase64 = e.target.result.split(",")[1];
      const preview = document.getElementById("aiPreview");
      const img = document.getElementById("aiPreviewImg");
      if (preview && img) {
        img.src = e.target.result;
        preview.style.display = "block";
      }
      updateAIButton();
    };
    reader.readAsDataURL(file);
  }

  function updateAIButton() {
    const btn = document.getElementById("btnAIExtract");
    const sel = document.getElementById("aiMatchSelect");
    if (btn && sel) btn.disabled = !(aiImageBase64 && sel.value);
  }

  async function extractWithAI() {
    if (!aiImageBase64) return;
    
    const loading = document.getElementById("aiLoading");
    const resultDiv = document.getElementById("aiResult");
    const formSection = document.getElementById("aiFormSection");
    
    loading.style.display = "flex";
    resultDiv.style.display = "none";
    formSection.style.display = "none";

    const imgInput = document.getElementById("aiImageInput");
    const fileType = (imgInput && imgInput.files[0]) ? imgInput.files[0].type : "image/jpeg";
    const GEMINI_KEY = "AIzaSyC8vJvdRgGK_VbxIeJYA9H-PUiTMrhOn4o";

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: fileType, data: aiImageBase64 } },
              { text: `Analizá esta imagen de resultados de fútbol y extraé TODOS los datos estadísticos que veas. Respondé ÚNICAMENTE con un JSON válido con esta estructura exacta (sin texto extra, sin markdown, sin backticks): {"homeGoals":0,"awayGoals":0,"homePossession":0,"awayPossession":0,"homeShots":0,"awayShots":0,"homeShotsOnTarget":0,"awayShotsOnTarget":0,"homeFouls":0,"awayFouls":0,"homeOffsides":0,"awayOffsides":0,"homeCorners":0,"awayCorners":0,"homeFreekicks":0,"awayFreekicks":0,"homePasses":0,"awayPasses":0,"homePassesCompleted":0,"awayPassesCompleted":0,"homeCrosses":0,"awayCrosses":0,"homeInterceptions":0,"awayInterceptions":0,"homeTackles":0,"awayTackles":0,"homeSaves":0,"awaySaves":0} Si un dato no está visible usá 0. El equipo de la IZQUIERDA es home y el de la DERECHA es away.` }
            ]
          }],
          generationConfig: { temperature: 0, maxOutputTokens: 1000 }
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      
      let parsed;
      try {
        parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      } catch(e) {
        throw new Error("No se pudo parsear la respuesta de la IA");
      }

      aiExtractedData = parsed;
      loading.style.display = "none";

      const sel = document.getElementById("aiMatchSelect");
      const mid = parseInt(sel.value);
      const match = allMatches.find(m => m.id === mid);
      
      formSection.style.display = "block";
      const formDiv = document.getElementById("aiExtractedForm");
      formDiv.innerHTML = renderAIExtractedForm(match, parsed);
      
    } catch(err) {
      loading.style.display = "none";
      resultDiv.style.display = "block";
      resultDiv.innerHTML = `<div class="ai-error">❌ Error: ${err.message}. Intentá de nuevo o usá la carga manual.</div>`;
    }
  }

  function renderAIExtractedForm(match, data) {
    if (!match) return '';
    return `
      <div class="load-form" style="margin-top:0;border:none">
        <div class="lf-match-header">
          <div class="lf-team" style="color:${TEAM_COLORS[match.home].primary}">${match.home}</div>
          <div class="lf-vs-block"><span class="lf-vs">VS</span></div>
          <div class="lf-team" style="color:${TEAM_COLORS[match.away].primary}">${match.away}</div>
        </div>
        <div class="lf-scores">
          <div class="lf-score-group"><label>${match.home}</label>
            <input type="number" id="ai_homeGoals" value="${data.homeGoals || 0}" min="0" max="30">
          </div>
          <div class="lf-score-sep">—</div>
          <div class="lf-score-group"><label>${match.away}</label>
            <input type="number" id="ai_awayGoals" value="${data.awayGoals || 0}" min="0" max="30">
          </div>
        </div>
        <div class="lf-stats-grid">
          ${aiStatRow("Posesión (%)", "Possession", data)}
          ${aiStatRow("Disparos", "Shots", data)}
          ${aiStatRow("Disparos al arco", "ShotsOnTarget", data)}
          ${aiStatRow("Faltas", "Fouls", data)}
          ${aiStatRow("Fueras de juego", "Offsides", data)}
          ${aiStatRow("Tiros de esquina", "Corners", data)}
          ${aiStatRow("Tiros libres", "Freekicks", data)}
          ${aiStatRow("Pases", "Passes", data)}
          ${aiStatRow("Pases completados", "PassesCompleted", data)}
          ${aiStatRow("Centros", "Crosses", data)}
          ${aiStatRow("Pases interceptados", "Interceptions", data)}
          ${aiStatRow("Entradas", "Tackles", data)}
          ${aiStatRow("Paradas", "Saves", data)}
        </div>
      </div>`;
  }

  function aiStatRow(label, key, data) {
    return `
      <div class="stat-row-form">
        <div class="srf-label">${label}</div>
        <input type="number" class="srf-input" id="ai_home${key}" value="${data['home'+key] || 0}" min="0">
        <div class="srf-sep">:</div>
        <input type="number" class="srf-input" id="ai_away${key}" value="${data['away'+key] || 0}" min="0">
      </div>`;
  }

  function saveAIExtracted() {
    const sel = document.getElementById("aiMatchSelect");
    if (!sel || !sel.value) return;
    const mid = parseInt(sel.value);
    const match = allMatches.find(m => m.id === mid);
    if (!match) return;

    const getVal = id => {
      const v = parseInt(document.getElementById(id)?.value);
      return isNaN(v) ? 0 : v;
    };

    match.stats = {
      homeGoals: getVal("ai_homeGoals"), awayGoals: getVal("ai_awayGoals"),
      homePossession: getVal("ai_homePossession"), awayPossession: getVal("ai_awayPossession"),
      homeShots: getVal("ai_homeShots"), awayShots: getVal("ai_awayShots"),
      homeShotsOnTarget: getVal("ai_homeShotsOnTarget"), awayShotsOnTarget: getVal("ai_awayShotsOnTarget"),
      homeFouls: getVal("ai_homeFouls"), awayFouls: getVal("ai_awayFouls"),
      homeOffsides: getVal("ai_homeOffsides"), awayOffsides: getVal("ai_awayOffsides"),
      homeCorners: getVal("ai_homeCorners"), awayCorners: getVal("ai_awayCorners"),
      homeFreekicks: getVal("ai_homeFreekicks"), awayFreekicks: getVal("ai_awayFreekicks"),
      homePasses: getVal("ai_homePasses"), awayPasses: getVal("ai_awayPasses"),
      homePassesCompleted: getVal("ai_homePassesCompleted"), awayPassesCompleted: getVal("ai_awayPassesCompleted"),
      homeCrosses: getVal("ai_homeCrosses"), awayCrosses: getVal("ai_awayCrosses"),
      homeInterceptions: getVal("ai_homeInterceptions"), awayInterceptions: getVal("ai_awayInterceptions"),
      homeTackles: getVal("ai_homeTackles"), awayTackles: getVal("ai_awayTackles"),
      homeSaves: getVal("ai_homeSaves"), awaySaves: getVal("ai_awaySaves"),
    };
    match.played = true;
    saveLocal();
    saveToFirebase(match);
    showToast("✅ ¡Partido cargado con IA y guardado!");
    aiImageBase64 = null;
    aiExtractedData = null;
    currentView = "standings";
    render();
  }

  // ===================== HELPERS =====================
  function formatDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr + "T12:00:00");
    return d.toLocaleDateString("es-AR", { day: "2-digit", month: "short" });
  }

  function showToast(msg, type = "success") {
    const t = document.createElement("div");
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.classList.add("show"), 10);
    setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 3000);
  }

  // ===================== INIT =====================
  loadLocal(); // load fixture structure immediately
  
  document.addEventListener("DOMContentLoaded", async () => {
    // Try to sync from Firebase (may override local data with cloud data)
    if (useFirebase) {
      const fbLoaded = await loadFromFirebase();
      if (fbLoaded) {
        const fbNotice = document.getElementById("fbNotice");
        if (fbNotice) fbNotice.style.display = "none";
      }
    }
    render();
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", () => {
        currentView = item.dataset.view;
        window._loadMatchId = null;
        render();
      });
    });
  });

  window.ligaRender = render;
  window.ligaCurrentView = () => currentView;
</script>

  .ai-container { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .ai-upload-zone {
    background: var(--bg2);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ai-upload-zone:hover, .ai-upload-zone.drag-over { border-color: var(--accent); background: rgba(0,195,255,0.05); }
  .auz-icon { font-size: 36px; margin-bottom: 8px; }
  .auz-text { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .auz-sub { font-size: 11px; color: var(--text2); }

  .ai-preview img { width: 100%; border-radius: var(--radius); border: 1px solid var(--border); max-height: 200px; object-fit: contain; background: #000; }

  .ai-match-select label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; }
  .ai-match-select .filter-select { width: 100%; }

  .btn-ai-extract {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #a8ff3e, #5a8a00);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(168,255,62,0.3);
  }
  .btn-ai-extract:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .btn-ai-extract:not(:disabled):hover { transform: translateY(-1px); }

  .ai-loading {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    padding: 20px;
    color: var(--text2);
    font-size: 14px;
  }
  .ai-spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ai-error {
    background: rgba(255,68,68,0.1);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 12px;
    color: var(--red);
    font-size: 13px;
  }

  /* ====== EMPTY STATE ====== */
  .empty-state {
    text-align: center;
    color: var(--text2);
    font-size: 13px;
    padding: 24px;
  }

  /* ====== TOAST ====== */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.toast-success { border-color: var(--green); color: var(--green); }
  .toast.toast-error { border-color: var(--red); color: var(--red); }

  /* ====== SCROLLBAR ====== */
  input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
  
  /* ====== FIREBASE INFO ====== */
  .firebase-notice {
    background: rgba(255,195,0,0.1);
    border: 1px solid rgba(255,195,0,0.3);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin: 10px 16px 0;
    font-size: 12px;
    color: var(--yellow);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .firebase-notice a { color: var(--accent); }
</style>
</head>
<body>
<div class="app-wrapper">

  <header class="app-header">
    <div>
      <div class="header-logo">LIGA <span>PRIVADA</span></div>
      <div class="header-sub">Temporada 2025</div>
    </div>
    <div class="header-badge">102 PARTIDOS</div>
  </header>

  <div class="firebase-notice" id="fbNotice">
    🔄 Sincronizando con Firebase... Los datos se compartirán entre dispositivos automáticamente.
  </div>

  <div id="app"></div>

  <nav class="app-nav">
    <button class="nav-item active" data-view="home">
      <span class="nav-icon">🏠</span>
      <span>Inicio</span>
    </button>
    <button class="nav-item" data-view="fixture">
      <span class="nav-icon">📆</span>
      <span>Fixture</span>
    </button>
    <button class="nav-item" data-view="standings">
      <span class="nav-icon">🏆</span>
      <span>Tabla</span>
    </button>
    <button class="nav-item" data-view="stats">
      <span class="nav-icon">📊</span>
      <span>Stats</span>
    </button>
    <button class="nav-item" data-view="load">
      <span class="nav-icon">📋</span>
      <span>Cargar</span>
    </button>
  </nav>

</div>

<script>
  // Re-bind nav after initial render
  document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      document.querySelectorAll(".nav-item").forEach(item => {
        item.addEventListener("click", () => {
          if (window.ligaRender) {
            window.ligaRender();
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            item.classList.add("active");
          }
        });
      });
    }, 500);
  });
</script>
</body>
</html>
